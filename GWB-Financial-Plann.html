<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GWB Financial Planner</title>

<!-- PWA META -->
<meta name="application-name" content="GWB Planner">
<meta name="description" content="Your personal monthly financial planner by Generational Wealth Builders.">
<meta name="theme-color" content="#0A1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GWB Planner">
<meta name="msapplication-TileColor" content="#0A1628">
<meta name="msapplication-tap-highlight" content="no">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" id="apple-icon">

<!-- Safe area insets for iPhone notch / Android nav bar -->
<style>
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .tb  { padding-top: max(0px, env(safe-area-inset-top)); height: calc(64px + env(safe-area-inset-top)); }
  .adv-bar { padding-top: max(0px, env(safe-area-inset-top)); height: calc(64px + env(safe-area-inset-top)); }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8923A;--gold-l:#D4AA5A;--gold-p:#FBF3E3;--gold-d:#8A6A22;
  --navy:#0A1628;--navy-l:#132040;--navy-2:#1E3055;
  --off:#F7F8FA;--card:#FFFFFF;--border:#EAECF0;--border-l:#F2F4F7;
  --mg:#7A8499;--dk:#0D1117;--mid:#3D4A5C;
  --green:#12A150;--red:#E02D3C;--amber:#F59E0B;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
}

html,body{font-family:var(--sans);background:var(--off);color:var(--dk);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:var(--sans);box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(184,146,58,.12);outline:none}
button{cursor:pointer;transition:all .15s}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D0D5DD;border-radius:10px}

/* ── AUTH ── */
.aw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--navy) 0%,var(--navy-l) 50%,var(--navy-2) 100%);padding:20px;position:relative;overflow:hidden}
.aw::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(184,146,58,.08) 0%,transparent 70%);top:-100px;right:-100px;pointer-events:none}
.aw::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(184,146,58,.06) 0%,transparent 70%);bottom:-80px;left:-80px;pointer-events:none}
.aw-topline{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--gold) 40%,var(--gold-l) 60%,transparent 100%)}
.ac{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:var(--r-xl);padding:48px 44px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);border:1px solid rgba(255,255,255,.3)}
.alogo{text-align:center;margin-bottom:32px}
.alogo img{width:76px;height:76px;object-fit:contain;display:block;margin:0 auto}
.alogo-s{font-size:10px;letter-spacing:.2em;color:var(--mg);text-transform:uppercase;font-family:var(--sans);margin-top:10px;font-weight:500}
.adiv{width:32px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto}
.alogo-p{font-size:11px;letter-spacing:.12em;color:var(--mg);text-transform:uppercase;font-family:var(--sans);font-weight:500}
.atitle{font-size:22px;font-weight:700;text-align:center;color:var(--navy);margin-bottom:28px;letter-spacing:-.3px}
.lbl{display:block;font-size:11px;letter-spacing:.03em;color:var(--mid);margin-bottom:6px;font-weight:500}
.ain{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--dk);background:#fff;outline:none;transition:all .2s}
.ain:hover{border-color:#C0C8D8}
.fld{margin-bottom:16px}
.gbtn{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);color:#fff;border:none;border-radius:var(--r-sm);padding:13px;font-size:12px;letter-spacing:.04em;font-weight:600;width:100%;cursor:pointer;margin-top:6px;box-shadow:0 4px 14px rgba(184,146,58,.35);transition:all .2s}
.gbtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,146,58,.45)}
.gbtn:active{transform:translateY(0)}
.aerr{background:#FFF1F2;border:1.5px solid #FECDD3;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:#BE123C;margin-bottom:16px;font-weight:500}

/* ── TOPBAR ── */
.tb{background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border),var(--shadow-sm)}
.lm{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm img{width:40px;height:40px;object-fit:contain;display:block}
.lt{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:-.1px}
.ls{font-size:10px;color:var(--mg);letter-spacing:.06em;text-transform:uppercase;font-weight:500;margin-top:1px}
.gbar{height:2px;background:linear-gradient(90deg,var(--gold-d),var(--gold),var(--gold-l),var(--gold))}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--off);border-radius:var(--r-md);padding:4px}
.tab{padding:7px 14px;background:transparent;border:none;border-radius:var(--r-sm);font-size:11px;letter-spacing:.02em;color:var(--mg);font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.tab.on{background:#fff;color:var(--navy);font-weight:600;box-shadow:var(--shadow-sm)}
.tab:hover:not(.on){background:rgba(255,255,255,.6);color:var(--mid)}
.ua{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--mg)}
.sob{background:none;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:6px 12px;font-size:11px;color:var(--mg);cursor:pointer;font-weight:500;transition:all .15s}
.sob:hover{border-color:var(--red);color:var(--red)}

/* ── PAGE ── */
.pg{max-width:1080px;margin:0 auto;padding:32px 28px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:14px}
.ptitle{font-size:28px;font-weight:700;color:var(--navy);letter-spacing:-.5px;font-family:var(--serif)}
.psub{font-size:13px;color:var(--mg);margin-top:4px;font-weight:400}

/* ── MONTH PICKER ── */
.mp{display:flex;align-items:center;gap:6px}
.mpb{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);width:30px;height:30px;color:var(--mid);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.mpb:hover{border-color:var(--gold);color:var(--gold)}
.mpl{font-size:13px;font-weight:600;color:var(--navy);min-width:130px;text-align:center;letter-spacing:-.1px}

/* ── SUMMARY CARDS ── */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.sc{background:var(--card);border-radius:var(--r-lg);padding:20px 22px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.sc:hover{box-shadow:var(--shadow-md)}
.sc.pri{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);border:none;box-shadow:0 8px 28px rgba(10,22,40,.25)}
.scl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mg);font-weight:600;margin-bottom:8px}
.sc.pri .scl{color:rgba(255,255,255,.5)}
.scv{font-size:24px;font-weight:700;color:var(--dk);letter-spacing:-.5px}
.sc.pri .scv{color:var(--gold-l)}
.scs{font-size:12px;color:var(--mg);margin-top:4px}
.sc.pri .scs{color:rgba(255,255,255,.35)}

/* ── SECTIONS ── */
.sec{margin-bottom:16px;background:var(--card);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
.sh{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border-l);user-select:none;transition:background .15s}
.sh:hover{background:#FAFBFC}
.stitle{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--navy)}
.stots{display:flex;gap:20px;align-items:center;font-size:12px;color:var(--mg);flex-wrap:wrap}
.stots b{color:var(--navy);font-weight:600}
.ch{padding:8px 22px;display:grid;grid-template-columns:1fr 120px 120px 100px 28px;gap:10px;border-bottom:1px solid var(--border-l);background:#FAFBFC}
.ch span{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mg);font-weight:600}
.br{padding:12px 22px;display:grid;grid-template-columns:1fr 120px 120px 100px 28px;gap:10px;align-items:center;border-bottom:1px solid var(--border-l);transition:background .12s}
.br:hover{background:#FAFBFC}
.bn{font-size:14px;color:var(--dk);font-weight:400}
.ni{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;color:var(--dk);background:#FAFBFC;text-align:right;outline:none;transition:all .15s}
.ni:hover{border-color:#C0C8D8}
.ni:focus{border-color:var(--gold);background:#fff}
.pb{height:5px;background:var(--border-l);border-radius:10px;overflow:hidden;margin-top:4px}
.pbf{height:100%;border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pcl{font-size:10px;color:var(--mg);margin-top:3px;font-weight:500}
.addb{background:none;border:none;color:var(--gold);font-size:12px;padding:11px 22px;display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;transition:opacity .15s}
.addb:hover{opacity:.7}
.db{background:none;border:none;color:#C8CDD8;font-size:18px;line-height:1;cursor:pointer;padding:2px;transition:color .15s;border-radius:4px}
.db:hover{color:var(--red)}

/* ── EXPENSE MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(10,22,40,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.md{background:#fff;border-radius:var(--r-xl);padding:32px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mt{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.cb{background:none;border:none;font-size:22px;color:var(--mg);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s}
.cb:hover{background:var(--off)}
.fin{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--dk);background:#fff;outline:none;transition:all .2s}
.fin:hover{border-color:#C0C8D8}
.fse{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--dk);background:#fff;outline:none;transition:all .2s}

/* ── TRANSACTIONS ── */
.tr{padding:14px 22px;display:grid;grid-template-columns:100px 1fr 130px 110px 28px;gap:10px;align-items:center;border-bottom:1px solid var(--border-l);transition:background .12s}
.tr:hover{background:#FAFBFC}
.tdt{font-size:11px;color:var(--mg);font-weight:500}
.tn{font-size:14px;color:var(--dk);font-weight:500}
.tnote{font-size:11px;color:var(--mg)}
.cbadge{font-size:10px;background:var(--gold-p);color:var(--gold-d);padding:4px 10px;border-radius:20px;text-align:center;letter-spacing:.04em;text-transform:uppercase;font-weight:600;white-space:nowrap}
.tamt{font-size:15px;font-weight:700;text-align:right;color:var(--dk)}

/* ── HISTORY ── */
.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.hc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.hc:hover{box-shadow:var(--shadow-md);border-color:var(--gold-l);transform:translateY(-2px)}

/* ── IFRAME (Book Advisor) ── */
.iframe-wrap{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.iframe-wrap iframe{width:100%;border:none;display:block;min-height:880px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:14px 20px;border-radius:var(--r-md);font-size:13px;font-weight:500;z-index:999;border-left:3px solid var(--gold);display:none;box-shadow:var(--shadow-lg);animation:toastIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── EMPTY STATE ── */
.empty{padding:48px 36px;text-align:center;color:var(--mg);font-size:14px}

/* ── ADVISOR DASHBOARD ── */
.adv-wrap{min-height:100vh;background:var(--navy);font-family:var(--sans)}
.adv-bar{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px}
.adv-bar-left{display:flex;align-items:center;gap:14px}
.adv-badge{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);color:#fff;font-size:9px;letter-spacing:.12em;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.adv-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px}
.adv-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.adv-pg{max-width:1160px;margin:0 auto;padding:36px 32px}
.adv-hero{margin-bottom:32px}
.adv-hero-title{font-size:32px;font-weight:700;color:#fff;letter-spacing:-.6px;font-family:var(--serif);margin-bottom:6px}
.adv-hero-sub{font-size:14px;color:rgba(255,255,255,.4)}
.adv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.adv-stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-lg);padding:20px 22px;transition:background .2s}
.adv-stat:hover{background:rgba(255,255,255,.08)}
.adv-stat-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px;font-weight:600}
.adv-stat-v{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px}
.adv-stat-s{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}
.adv-stat.gold .adv-stat-v{color:var(--gold-l)}
.adv-stat.red .adv-stat-v{color:#F87171}
.adv-stat.green .adv-stat-v{color:#4ADE80}
.adv-stat.amber .adv-stat-v{color:#FBB347}
.adv-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.adv-filter-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:6px 14px;font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;font-weight:500;transition:all .15s;letter-spacing:.02em}
.adv-filter-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.adv-filter-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}
.adv-search{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:7px 14px;font-size:12px;color:#fff;outline:none;width:220px;margin-left:auto}
.adv-search::placeholder{color:rgba(255,255,255,.25)}
.adv-search:focus{border-color:var(--gold);background:rgba(255,255,255,.08)}
.adv-table{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-lg);overflow:hidden}
.adv-th{display:grid;grid-template-columns:2fr 110px 110px 110px 110px 130px 90px;gap:10px;padding:12px 22px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07)}
.adv-th span{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600}
.adv-row{display:grid;grid-template-columns:2fr 110px 110px 110px 110px 130px 90px;gap:10px;padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.05);align-items:center;transition:background .12s;cursor:pointer}
.adv-row:hover{background:rgba(255,255,255,.04)}
.adv-row:last-child{border-bottom:none}
.adv-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.1px}
.adv-email{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.adv-pill{display:inline-block;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;text-align:center}
.adv-pill.high{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.adv-pill.mod{background:rgba(251,146,60,.12);color:#FBB347;border:1px solid rgba(251,146,60,.18)}
.adv-pill.low{background:rgba(74,222,128,.1);color:#4ADE80;border:1px solid rgba(74,222,128,.15)}
.adv-pill.none{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}
.adv-gap-val{font-size:14px;font-weight:600;color:#fff}
.adv-activity{font-size:12px;font-weight:500}
.adv-activity.urgent{color:#F87171}
.adv-activity.warn{color:#FBB347}
.adv-activity.ok{color:rgba(255,255,255,.4)}
.adv-urgency-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.adv-urgency-dot.red{background:#F87171;box-shadow:0 0 6px rgba(248,113,113,.5)}
.adv-urgency-dot.amber{background:#FBB347;box-shadow:0 0 6px rgba(251,179,71,.4)}
.adv-urgency-dot.green{background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,.3)}
.adv-urgency-dot.grey{background:rgba(255,255,255,.2)}
.adv-empty{padding:64px 32px;text-align:center;color:rgba(255,255,255,.2);font-size:14px}
.adv-loading{padding:64px 32px;text-align:center;color:rgba(255,255,255,.3);font-size:13px}
.adv-modal-bg{position:fixed;inset:0;background:rgba(5,10,20,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.adv-modal{background:var(--navy-l);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-xl);padding:36px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.adv-modal-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.adv-modal-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px}
.adv-modal-email{font-size:12px;color:rgba(255,255,255,.3);margin-top:3px}
.adv-modal-close{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.adv-modal-close:hover{background:rgba(255,255,255,.14);color:#fff}
.adv-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.adv-modal-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-md);padding:14px 16px}
.adv-modal-card-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px;font-weight:600}
.adv-modal-card-v{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.adv-modal-card-v.gold{color:var(--gold-l)}
.adv-modal-card-v.red{color:#F87171}
.adv-modal-card-v.green{color:#4ADE80}
.adv-modal-section{margin-bottom:18px}
.adv-modal-section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.adv-modal-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.adv-modal-row-l{font-size:12px;color:rgba(255,255,255,.4)}
.adv-modal-row-v{font-size:13px;font-weight:600;color:#fff}
.adv-action-btn{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);border:none;color:#fff;border-radius:var(--r-sm);padding:11px 20px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.03em;transition:all .15s;width:100%;margin-top:6px}
.adv-action-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,146,58,.4)}
.adv-action-btn.ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);box-shadow:none}
.adv-action-btn.ghost:hover{background:rgba(255,255,255,.11);transform:translateY(-1px)}

/* ── RESPONSIVE ── */
/* ═══════════════════════════════════════════════════════════
   MOBILE — bottom nav + full overhaul
   ═══════════════════════════════════════════════════════════ */

/* ── Bottom Navigation Bar ── */
.mob-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  padding:8px 0 max(8px, env(safe-area-inset-bottom));
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.mob-nav-inner{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:0;
}
.mob-tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px 2px;
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);
  color:var(--mg);
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.mob-tab.on{color:var(--gold);}
.mob-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.mob-tab span{font-size:9px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;}

/* ── More Menu Sheet ── */
.mob-more-sheet{
  display:none;
  position:fixed;inset:0;z-index:200;
}
.mob-more-sheet.open{display:block;}
.mob-more-overlay{position:absolute;inset:0;background:rgba(10,22,40,.4);backdrop-filter:blur(2px);}
.mob-more-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:#fff;border-radius:20px 20px 0 0;
  padding:20px 0 max(24px,env(safe-area-inset-bottom));
  box-shadow:0 -12px 40px rgba(0,0,0,.15);
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mob-more-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.mob-more-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mg);font-weight:600;padding:0 20px 12px;}
.mob-more-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.mob-more-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 14px;background:var(--off);border-radius:var(--r-md);
  border:none;cursor:pointer;font-family:var(--sans);
  text-align:left;-webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.mob-more-item:active{background:var(--border-l);}
.mob-more-item svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.mob-more-item span{font-size:13px;font-weight:500;color:var(--navy);}
.mob-more-item.on span{color:var(--gold);}
.mob-more-item.on{background:var(--gold-p);}

@media(max-width:768px){
  /* Hide desktop tabs */
  .tabs{display:none!important}
  /* Show bottom nav */
  .mob-nav{display:block}
  /* Topbar — simpler on mobile */
  .tb{padding:0 16px;height:58px;}
  .tb .ua .sob{display:none}
  /* Page padding + bottom clearance for nav bar */
  .pg{padding:16px 14px 90px;}
  /* Summary cards: 2 col */
  .sg{grid-template-columns:1fr 1fr}
  .sg .sc:last-child{grid-column:span 2}
  .sc{padding:16px 14px;}
  .scv{font-size:20px;}
  /* Budget rows: name + budget only */
  .ch,.br{grid-template-columns:1fr 100px 28px}
  .ch span:nth-child(3),.ch span:nth-child(4),
  .br>div:nth-child(3),.br>div:nth-child(4){display:none}
  /* Transaction rows: name + amount only */
  .tr{grid-template-columns:1fr auto 28px;gap:8px;padding:12px 14px;}
  .tr .tdt,.tr .cbadge{display:none}
  .tamt{font-size:14px;}
  /* Section headers */
  .sh{padding:14px 14px;}
  .sec{border-radius:var(--r-md);}
  .ch{padding:8px 14px;}
  .br{padding:10px 14px;}
  /* Page header */
  .ph{margin-bottom:18px;flex-direction:column;gap:10px;}
  .ptitle{font-size:22px;}
  /* Auth card */
  .ac{padding:32px 22px;}
  /* Month picker */
  .mp{gap:4px;}
  /* Modals full screen on mobile */
  .mbg{align-items:flex-end;}
  .md{max-height:92vh;border-radius:20px 20px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));}
  /* History grid */
  .hg{grid-template-columns:1fr 1fr;}
  /* Advisor table - stack on mobile */
  .adv-th{display:none}
  .adv-row{grid-template-columns:1fr auto;gap:8px;padding:14px 16px;}
  .adv-row > div:nth-child(3),
  .adv-row > div:nth-child(4),
  .adv-row > div:nth-child(5){display:none}
  .adv-stats{grid-template-columns:1fr 1fr;}
  .adv-pg{padding:20px 16px 90px;}
  .adv-filters{gap:6px;}
  .adv-search{width:100%;margin-left:0;margin-top:4px;}
  /* Debt / goals sections */
  .ni{font-size:14px;}
}
@media(max-width:400px){
  .sg{grid-template-columns:1fr}
  .sg .sc:last-child{grid-column:span 1}
  .hg{grid-template-columns:1fr}
  .mob-more-grid{grid-template-columns:1fr}
}
</style>

// Static fallback rates (BWP base) — updated periodically
const FALLBACK_RATES = {
  BWP:1, ZAR:1.26, USD:0.073, GBP:0.057,
  EUR:0.067, ZMW:1.94, ZWL:26.5, NAD:1.26
};

window.FX = window.FX || {
  currency: 'BWP',
  rate: 1,          // how many selected currency = 1 BWP
  lastFetched: null,
  ratesMap: {...FALLBACK_RATES}
};

window.fxSave = async function(){
  if(!S.user) return;
  await sb.from('user_tools').upsert(
    {user_id:S.user.id, tool:'fx', data:{currency:FX.currency,ratesMap:FX.ratesMap}, updated_at:new Date().toISOString()},
    {onConflict:'user_id,tool'}
  );
};

async function loadFX(){
  if(!S.user) return;
  const {data} = await sb.from('user_tools').select('data')
    .eq('user_id',S.user.id).eq('tool','fx').single();
  if(data?.data){
    FX.currency = data.data.currency || 'BWP';
    if(data.data.ratesMap) FX.ratesMap = {...FALLBACK_RATES,...data.data.ratesMap};
  }
  FX.rate = FX.ratesMap[FX.currency]||1;
  // Try to fetch live rates (silently falls back if fails)
  fetchLiveRates();
}

async function fetchLiveRates(){
  try{
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/BWP');
    if(!res.ok) return;
    const data = await res.json();
    if(data.rates){
      Object.keys(FALLBACK_RATES).forEach(c=>{
        if(data.rates[c]) FX.ratesMap[c] = data.rates[c];
      });
      FX.rate = FX.ratesMap[FX.currency]||1;
      FX.lastFetched = new Date().toISOString();
      fxSave();
      render();
    }
  }catch(e){ /* use fallback rates silently */ }
}

window.setCurrency = function(code){
  FX.currency = code;
  FX.rate = FX.ratesMap[code]||1;
  fxSave();
  render();
};

// Convert BWP amount → selected currency
function toFX(bwp){ return (bwp||0) * FX.rate; }
// Convert selected currency → BWP (for input values stored in native currency)
function fromFX(val){ return (val||0) / (FX.rate||1); }

function fmt(n){
  const c = CURRENCIES[FX.currency]||CURRENCIES.BWP;
  const v = toFX(n||0);
  return c.symbol+' '+v.toLocaleString(c.locale,{minimumFractionDigits:2,maximumFractionDigits:2});
}
function pct(s,b){return(!b||b===0)?0:Math.min(100,Math.round((s/b)*100));}
function mk(){return S.year+'-'+String(S.month+1).padStart(2,'0');}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',3200);}
function spCat(c){return(S.tx||[]).filter(t=>t.category===c).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);}
function spItem(c,n){return(S.tx||[]).filter(t=>t.category===c&&t.item_name===n).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);}
function tots(){
  const bd=S.bd||{};
  const inc=(bd.income||[]).reduce((s,i)=>s+(parseFloat(i.budgeted)||0),0);
  const exp=Object.keys(bd).filter(k=>k!=='income').reduce((s,k)=>s+(bd[k]||[]).reduce((a,i)=>a+(parseFloat(i.budgeted)||0),0),0);
  const spent=(S.tx||[]).filter(t=>t.category!=='income').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  return{inc,exp,spent,rem:inc-exp};
}

// Connection 1: Loan Tracker → Budget
// Syncs LT loans into budget 'loans' category as line items
function syncLoansToBudget(){
  if(!S.bd) return;
  // Build loan repayment items from LT
  const loanItems = (LT.loans||[]).map(l=>({
    name: l.name,
    budgeted: l.monthlyPayment||0
  }));
  S.bd.loans = loanItems;
  // Save budget silently
  if(S.user && loanItems.length >= 0){
    sb.from('budgets').upsert(
      {user_id:S.user.id, month_key:mk(), categories:S.bd, updated_at:new Date().toISOString()},
      {onConflict:'user_id,month_key'}
    );
  }
}

// Connection 2: Expense logged → reduce loan balance
// If the logged expense category is 'loans', find matching loan and reduce balance
function applyPaymentToLoan(itemName, amount){
  if(!LT.loans||!LT.loans.length) return;
  const loan = LT.loans.find(l=>l.name.toLowerCase()===itemName.toLowerCase());
  if(loan){
    loan.balance = Math.max(0, loan.balance - amount);
    ltSave();
    // Also update GC.debts to reflect new total
    GC.debts = LT.loans.reduce((s,l)=>s+l.balance, 0);
    gcSave();
  }
}

// Connection 3: Loan Tracker → Wealth Gap (auto-populate debts)
// Called whenever loans change
function syncLoansToGap(){
  const totalDebt = (LT.loans||[]).reduce((s,l)=>s+l.balance, 0);
  if(totalDebt > 0){
    GC.debts = totalDebt;
    gcSave();
  }
}

// Connection 4: Budget savings → Goals progress
// Called whenever budget is saved — updates each goal's auto-contribution
function syncSavingsToGoals(){
  if(!S.bd||!SG.goals||!SG.goals.length) return;
  const monthlySavings = (S.bd.savings||[]).reduce((s,i)=>s+(parseFloat(i.budgeted)||0),0);
  if(monthlySavings <= 0) return;
  // Distribute savings proportionally across goals that have auto-contribution enabled
  const autoGoals = SG.goals.filter(g=>g.autoContribute);
  if(!autoGoals.length) return;
  const share = monthlySavings / autoGoals.length;
  autoGoals.forEach(g=>{
    g.saved = Math.min(g.target, (g.saved||0) + share);
  });
  sgSave();
}

function calcLoan(balance, annualRate, monthlyPayment){
  if(balance<=0||monthlyPayment<=0) return {months:0,totalInterest:0,rows:[]};
  const mRate = annualRate/100/12;
  let rem = balance, totalInterest=0;
  const rows=[];
  let month=0;
  while(rem>0.01 && month<600){
    month++;
    const interest = rem*mRate;
    if(monthlyPayment<=interest) break;
    const principal = Math.min(monthlyPayment-interest, rem);
    rem = Math.max(0, rem-principal);
    totalInterest += interest;
    rows.push({month, payment:principal+interest, principal, interest, remaining:rem});
  }
  return {months:month, totalInterest, rows};
}

function ltPayoffDate(months){
  const d=new Date();
  d.setMonth(d.getMonth()+months);
  return d.toLocaleDateString('en-BW',{month:'short',year:'numeric'});
}

// RETIREMENT CALCULATOR
// ══════════════════════════════════════════════════════════════
window.RC = window.RC || {
  age: 0,
  retireAge: 65,
  lifeExpectancy: 85,
  currentSavings: 0,
  monthlyContrib: 0,
  annualReturn: 10,
  inflationRate: 5,
  incomeReplacement: 75
};

window.rcSave = async function(){
  if(!S.user) return;
  await sb.from('user_tools').upsert(
    {user_id:S.user.id, tool:'retire', data:RC, updated_at:new Date().toISOString()},
    {onConflict:'user_id,tool'}
  );
};

async function loadRetire(){
  if(!S.user) return;
  const {data} = await sb.from('user_tools').select('data')
    .eq('user_id',S.user.id).eq('tool','retire').single();
  if(data?.data) Object.assign(RC, data.data);
  // Auto-pull monthly contribution from savings budget
  const bd = S.bd||{};
  const budgetSavings = (bd.savings||[]).reduce((s,i)=>s+(parseFloat(i.budgeted)||0),0);
  if(budgetSavings > 0 && !RC._manualContrib) RC.monthlyContrib = budgetSavings;
  render();
}

window.rcUpdate = function(key, val){
  RC[key] = parseFloat(val)||0;
  if(key==='monthlyContrib') RC._manualContrib = true;
  rcSave();
  render();
};

// Core projection engine
function projectRetirement(){
  const yearsToRetire = Math.max(0, (RC.retireAge||65) - (RC.age||30));
  const yearsInRetire  = Math.max(0, (RC.lifeExpectancy||85) - (RC.retireAge||65));
  const monthlyReturn  = (RC.annualReturn||10) / 100 / 12;
  const realReturn     = ((1 + (RC.annualReturn||10)/100) / (1 + (RC.inflationRate||5)/100)) - 1;
  const realMonthly    = realReturn / 12;
  const n              = yearsToRetire * 12;

  // Future value of current savings
  const fvSavings = (RC.currentSavings||0) * Math.pow(1 + monthlyReturn, n);

  // Future value of monthly contributions (annuity)
  const fvContribs = monthlyReturn > 0
    ? (RC.monthlyContrib||0) * ((Math.pow(1 + monthlyReturn, n) - 1) / monthlyReturn)
    : (RC.monthlyContrib||0) * n;

  const totalAtRetire = fvSavings + fvContribs;

  // Monthly income from fund at retirement (real returns)
  const retireMonths = yearsInRetire * 12;
  const monthlyIncome = realMonthly > 0 && retireMonths > 0
    ? totalAtRetire * (realMonthly * Math.pow(1+realMonthly, retireMonths)) / (Math.pow(1+realMonthly, retireMonths)-1)
    : (retireMonths > 0 ? totalAtRetire / retireMonths : 0);

  // Target: % of current income
  const currentIncome = S.bd ? (S.bd.income||[]).reduce((s,i)=>s+(parseFloat(i.budgeted)||0),0) : 0;
  const targetMonthly = currentIncome * ((RC.incomeReplacement||75)/100);

  // Gap
  const monthlyGap = Math.max(0, targetMonthly - monthlyIncome);

  // Required monthly contribution to close gap
  const requiredContrib = monthlyReturn > 0 && n > 0
    ? (targetMonthly * ((Math.pow(1+realMonthly,retireMonths)-1)/(realMonthly*Math.pow(1+realMonthly,retireMonths))) - (RC.currentSavings||0)*Math.pow(1+monthlyReturn,n))
      * (monthlyReturn / (Math.pow(1+monthlyReturn,n)-1))
    : 0;

  // Year-by-year data for chart (every 5 years)
  const chartData = [];
  let bal = RC.currentSavings||0;
  for(let m=0; m<=n; m++){
    bal = bal*(1+monthlyReturn) + (RC.monthlyContrib||0);
    if(m % 60 === 0) chartData.push({year: (RC.age||30) + m/12, balance: Math.round(bal)});
  }

  return {
    yearsToRetire, yearsInRetire, totalAtRetire,
    monthlyIncome, targetMonthly, monthlyGap,
    requiredContrib: Math.max(0, requiredContrib),
    currentIncome, chartData,
    onTrack: monthlyIncome >= targetMonthly
  };
}

function fmtM(n){
  const c = CURRENCIES[FX.currency]||CURRENCIES.BWP;
  const v = toFX(n||0);
  if(v>=1000000) return c.symbol+' '+(v/1000000).toFixed(2)+'M';
  if(v>=1000)    return c.symbol+' '+(v/1000).toFixed(1)+'K';
  return fmt(n);
}

function renderRetire(){
  const T  = tots();
  const P  = projectRetirement();
  const bd = S.bd||{};
  const budgetSavings = (bd.savings||[]).reduce((s,i)=>s+(parseFloat(i.budgeted)||0),0);

  // Build SVG bar chart of projected growth
  const maxBal   = P.chartData.length ? Math.max(...P.chartData.map(d=>d.balance)) : 1;
  const chartW   = 580;
  const chartH   = 140;
  const barW     = P.chartData.length > 1 ? Math.floor((chartW - 40) / P.chartData.length) - 4 : 60;
  const bars     = P.chartData.map((d,i)=>{
    const h   = Math.max(4, Math.round((d.balance/maxBal)*chartH));
    const x   = 20 + i*(barW+4);
    const y   = chartH - h;
    const col = d.balance >= P.totalAtRetire*0.95 ? '#9A7B2F' : '#C9C5BB';
    return `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="2" fill="${col}"/>
    <text x="${x+barW/2}" y="${chartH+14}" text-anchor="middle" font-size="9" fill="#9A9A8E" font-family="Lato,sans-serif">Age ${Math.round(d.year)}</text>`;
  }).join('');

  function rcField(key, label, hint, min, max, step, suffix){
    const val = RC[key]||0;
    return `<div>
      <label style="display:block;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--mg);font-family:var(--sans);margin-bottom:5px">${label}</label>
      <div style="position:relative">
        <input class="ni" type="number" min="${min}" max="${max}" step="${step||1}"
          style="text-align:left;width:100%;background:#fff;padding-right:${suffix?'32px':'10px'}"
          value="${val}" onchange="rcUpdate('${key}',this.value)">
        ${suffix?`<span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--mg);font-family:var(--sans);pointer-events:none">${suffix}</span>`:''}
      </div>
      <div style="font-size:10px;color:var(--mg);font-family:var(--sans);margin-top:3px">${hint}</div>
    </div>`;
  }

  return `
  <div class="ph">
    <div>
      <div class="ptitle">Retirement Calculator</div>
      <div class="psub">See if you are on track — and exactly what it will take to retire comfortably.</div>
    </div>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="sg" style="margin-bottom:20px">
    <div class="sc pri">

window.RE = window.RE || { items:[], nextId:1 };

window.reSave = async function(){
  if(!S.user) return;
  await sb.from('user_tools').upsert(
    {user_id:S.user.id, tool:'recurring', data:RE, updated_at:new Date().toISOString()},
    {onConflict:'user_id,tool'}
  );
};

async function loadRecurring(){
  if(!S.user) return;
  const {data} = await sb.from('user_tools').select('data')
    .eq('user_id',S.user.id).eq('tool','recurring').single();
  if(data?.data){ Object.assign(RE, data.data); if(!RE.nextId) RE.nextId=1; }
  // Auto-post any due recurring expenses for this month
  await autoPostRecurring();
  render();
}

// Check each recurring item — if not yet posted this month, post it
async function autoPostRecurring(){
  if(!S.user||!RE.items||!RE.items.length) return;
  const key = mk();
  // Get existing transactions for this month to avoid duplicates
  const {data:existing} = await sb.from('transactions').select('item_name,category')
    .eq('user_id',S.user.id).eq('month_key',key);
  const posted = new Set((existing||[]).map(t=>`${t.category}::${t.item_name}`));

  const toPost = RE.items.filter(r=>{
    if(!r.active) return false;
    return !posted.has(`${r.category}::${r.name}`);
  });

  if(!toPost.length) return;

  // Batch insert all due recurring expenses
  const rows = toPost.map(r=>({
    user_id: S.user.id,
    month_key: key,
    category: r.category,
    item_name: r.name,
    amount: r.amount,
    note: r.note||'Auto — recurring',
    date: new Date().toISOString().split('T')[0],
  }));
  await sb.from('transactions').insert(rows);

  // Update lastPosted on each item
  toPost.forEach(r=>{ r.lastPosted = key; });
  reSave();

  if(toPost.length) toast(`${toPost.length} recurring expense${toPost.length>1?'s':''} auto-posted ↻`);
  loadT();
}

window.reAdd = function(){
  const name  = document.getElementById('re-name')?.value.trim();
  const amt   = parseFloat(document.getElementById('re-amt')?.value)||0;
  const cat   = document.getElementById('re-cat')?.value||'lifestyle';
  const note  = document.getElementById('re-note')?.value.trim();
  if(!name||!amt){ toast('Enter a name and amount'); return; }
  if(!RE.items) RE.items=[];
  RE.items.push({id:RE.nextId++, name, amount:amt, category:cat, note, active:true, lastPosted:null, createdOn:new Date().toISOString()});
  ['re-name','re-amt','re-note'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  reSave();
  toast('Recurring expense added ✓');
  render();
};

window.reToggle = function(id){
  const item = RE.items.find(r=>r.id===id);
  if(item){ item.active=!item.active; reSave(); render(); }
};

window.reRemove = function(id){
  RE.items = RE.items.filter(r=>r.id!==id);
  reSave(); render();
};

window.rePostNow = async function(id){
  const r = RE.items.find(x=>x.id===id);
  if(!r) return;
  await sb.from('transactions').insert({
    user_id:S.user.id, month_key:mk(),
    category:r.category, item_name:r.name,
    amount:r.amount, note:r.note||'Manually posted — recurring',
    date:new Date().toISOString().split('T')[0],
  });
  r.lastPosted = mk();
  reSave();
  toast(`${r.name} posted ✓`);
  loadT();
};

// ADVISOR DASHBOARD
// ══════════════════════════════════════════════════════════════
const ADVISOR_EMAIL = 'generationalwealthb@gmail.com';

let ADV = {
  clients: [],      // [{id, email, name, last_login, gap_data, budget_data, tx_data}]
  loading: true,
  filter: 'all',    // all | urgent | high | moderate | low
  search: '',
  selectedClient: null,
  modal: false,
};

function isAdvisor(){ return S.user?.email?.toLowerCase() === ADVISOR_EMAIL.toLowerCase(); }

// ── Load all client data ──────────────────────────────────────
async function loadAdvisorData(){
  ADV.loading = true; render();

  // 1. All user profiles (from advisor_clients view — see SQL)
  const { data: profiles } = await sb.from('advisor_clients').select('*');
  if(!profiles){ ADV.loading=false; render(); return; }

  // 2. For each client, pull gap tool data + last budget + last_login
  const ids = profiles.map(p=>p.id);

  const [gapRes, budgetRes, txRes] = await Promise.all([
    sb.from('user_tools').select('user_id,data,updated_at').eq('tool','gap').in('user_id', ids),
    sb.from('budgets').select('user_id,month_key,categories,updated_at').in('user_id', ids).order('month_key',{ascending:false}),
    sb.from('transactions').select('user_id,created_at').in('user_id', ids).order('created_at',{ascending:false}),
  ]);

  const gapMap    = {};
  const budgetMap = {};
  const lastTxMap = {};

  (gapRes.data||[]).forEach(g => { gapMap[g.user_id] = g; });

  // Latest budget per user
  (budgetRes.data||[]).forEach(b => {
    if(!budgetMap[b.user_id]) budgetMap[b.user_id] = b;
  });

  // Latest tx per user
  (txRes.data||[]).forEach(t => {
    if(!lastTxMap[t.user_id]) lastTxMap[t.user_id] = t.created_at;
  });

  ADV.clients = profiles
    .filter(p => p.email?.toLowerCase() !== ADVISOR_EMAIL.toLowerCase())
    .map(p => {
      const gapEntry  = gapMap[p.id];
      const gc        = gapEntry?.data || {};
      const bEntry    = budgetMap[p.id];
      const bd        = bEntry?.categories || {};

      // Re-compute gap metrics from stored data
      const monthlyIncome  = (bd.income||[]).reduce((s,i)=>s+(parseFloat(i.budgeted)||0),0);
      const monthlyExp     = ['housing','transport','food','personal','lifestyle','giving']
        .reduce((s,k)=>s+(bd[k]||[]).reduce((a,i)=>a+(parseFloat(i.budgeted)||0),0),0);

      const savingsTotal  = gc.savings||0;
      const debtsTotal    = gc.debts||0;
      const coverExisting = gc.cover||0;
      const yearsNeeded   = gc.years||10;
      const annualIncome  = monthlyIncome*12;

      const totalNeed   = monthlyExp*12*yearsNeeded + debtsTotal;
      const totalHave   = savingsTotal + coverExisting;
      const gap         = Math.max(0, totalNeed - totalHave);
      const coveredPct  = totalNeed>0 ? Math.min(100,Math.round((totalHave/totalNeed)*100)) : 100;

      let riskScore = 0;
      if(monthlyIncome>0){
        const coverRatio   = coverExisting/Math.max(annualIncome,1);
        const savingsRatio = savingsTotal/Math.max(monthlyExp*6,1);
        const debtRatio    = debtsTotal/Math.max(annualIncome,1);
        riskScore = Math.min(100,Math.round(
          (1-Math.min(1,coverRatio/5))*40 +
          (1-Math.min(1,savingsRatio))*30 +
          Math.min(1,debtRatio)*30
        ));
      }
      const riskLabel = riskScore>=70?'High':riskScore>=40?'Moderate':'Low';

      // Last activity = latest of: last_login, last gap save, last budget save, last tx
      const dates = [
        p.last_login_at,
        gapEntry?.updated_at,
        bEntry?.updated_at,
        lastTxMap[p.id],
      ].filter(Boolean).map(d=>new Date(d).getTime());
      const lastActive = dates.length ? new Date(Math.max(...dates)) : null;
      const daysSince  = lastActive ? Math.floor((Date.now()-lastActive.getTime())/(1000*86400)) : 999;

      return {
        id: p.id, email: p.email,
        name: p.raw_user_meta_data?.full_name || p.email?.split('@')[0] || 'Client',
        monthlyIncome, monthlyExp, gap, coveredPct,
        riskScore, riskLabel,
        totalNeed, totalHave, savingsTotal, debtsTotal, coverExisting,
        lastActive, daysSince,
        hasData: monthlyIncome>0 || gap>0 || savingsTotal>0,
        bd, gc,
      };
    });

  ADV.loading = false;
  render();
}

// ── Advisor formatting helpers ────────────────────────────────
function advFmt(n){
  const v = n||0;
  if(v>=1000000) return 'P '+( v/1000000).toFixed(1)+'M';
  if(v>=1000)    return 'P '+( v/1000   ).toFixed(0)+'K';
  return 'P '+v.toLocaleString('en-BW',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function urgencyClass(c){
  if(!c.hasData)    return 'none';
  if(c.daysSince>=30) return 'red';     // gone cold → urgent
  if(c.riskScore>=70) return 'red';
  if(c.riskScore>=40) return 'amber';
  return 'green';
}

function urgencyDotClass(c){
  const u = urgencyClass(c);
  return u==='red'?'red':u==='amber'?'amber':u==='green'?'green':'grey';
}

function activityText(c){
  if(!c.lastActive) return 'Never logged in';
  if(c.daysSince===0) return 'Active today';
  if(c.daysSince===1) return 'Yesterday';
  if(c.daysSince<7)   return c.daysSince+'d ago';
  if(c.daysSince<30)  return Math.floor(c.daysSince/7)+'w ago';
  return Math.floor(c.daysSince/30)+'mo ago — follow up!';
}

function activityClass(c){
  if(c.daysSince>=30) return 'urgent';
  if(c.daysSince>=14) return 'warn';
  return 'ok';
}

function renderAdvisor(){
  const clients = ADV.clients;

  // Summary stats
  const total    = clients.length;
  const urgent   = clients.filter(c=>urgencyClass(c)==='red').length;
  const highRisk = clients.filter(c=>c.riskScore>=70).length;
  const inactive = clients.filter(c=>c.daysSince>=30).length;
  const totalGap = clients.reduce((s,c)=>s+c.gap,0);

  // Filter + search
  let filtered = clients;
  if(ADV.filter==='urgent')   filtered = clients.filter(c=>urgencyClass(c)==='red');
  if(ADV.filter==='high')     filtered = clients.filter(c=>c.riskScore>=70);
  if(ADV.filter==='moderate') filtered = clients.filter(c=>c.riskScore>=40&&c.riskScore<70);
  if(ADV.filter==='low')      filtered = clients.filter(c=>c.riskScore<40&&c.hasData);
  if(ADV.filter==='inactive') filtered = clients.filter(c=>c.daysSince>=30);
  if(ADV.search){
    const q = ADV.search.toLowerCase();
    filtered = filtered.filter(c=>c.name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q));

    const ub=urgencyClass(b)==='red'?0:urgencyClass(b)==='amber'?1:2;

  return`

function bindAdvisorAuth(){
  document.getElementById('asub')?.addEventListener('click', async()=>{
    S.ae  = document.getElementById('ae')?.value||'';
    S.ap2 = document.getElementById('ap2')?.value||'';
    // Reject non-advisor logins on this page
    if(S.ae.toLowerCase() !== ADVISOR_EMAIL.toLowerCase()){
      S.aerr='This portal is for advisors only.'; render(); return;

    S.aerr=''; S.al=true; render();
    try{

      S.user=data.user; S.al=false;
      loadAdvisorData();

function bindAdvisor(){
  // Sign out
  document.getElementById('so')?.addEventListener('click',()=>{sb.auth.signOut();S.user=null;render();});

  // Filter buttons
  document.querySelectorAll('[data-af]').forEach(b=>b.addEventListener('click',()=>{
    ADV.filter=b.dataset.af; render();
  }));

  // Search
  document.getElementById('adv-search')?.addEventListener('input', e=>{
    ADV.search=e.target.value; render();
  });

  // Row click or View button → open modal
  document.querySelectorAll('[data-cview]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation();
    const cid = b.dataset.cview;
    ADV.selectedClient = ADV.clients.find(c=>c.id===cid)||null;
    ADV.modal = !!ADV.selectedClient;
    render();
  }));
  document.querySelectorAll('.adv-row[data-cid]').forEach(row=>row.addEventListener('click',()=>{
    const cid = row.dataset.cid;
    ADV.selectedClient = ADV.clients.find(c=>c.id===cid)||null;
    ADV.modal = !!ADV.selectedClient;
    render();
  }));

  // Close modal
  document.getElementById('adv-mc')?.addEventListener('click',()=>{ADV.modal=false;render();});
  document.getElementById('adv-mbg')?.addEventListener('click', e=>{
    if(e.target.id==='adv-mbg'){ADV.modal=false;render();}
  });
}

let saveTimer;
function bind(){
  document.getElementById('asub')?.addEventListener('click',async()=>{
    S.ae=document.getElementById('ae')?.value||'';S.ap2=document.getElementById('ap2')?.value||'';S.an=document.getElementById('an')?.value||'';
    S.aerr='';S.al=true;render();
    try{
      if(S.am==='login'){
        const{data,error}=await sb.auth.signInWithPassword({email:S.ae,password:S.ap2});
        if(error)throw error;S.user=data.user;S.al=false;
        if(isAdvisor()){ loadAdvisorData(); } else { loadFX();loadB();loadT();loadH();loadGap();loadLoans();loadGoals();loadRetire();loadRecurring(); }
      }else{
        const{data,error}=await sb.auth.signUp({email:S.ae,password:S.ap2,options:{data:{full_name:S.an}}});
        if(error)throw error;
        if(data.user&&data.session){S.user=data.user;S.al=false;
          if(isAdvisor()){ loadAdvisorData(); } else { loadFX();loadB();loadT();loadH();loadGap();loadLoans();loadGoals();loadRetire();loadRecurring(); }}
        else{S.aerr='Account created! You can now sign in.';S.am='login';S.al=false;render();}
      }
    }catch(e){S.aerr=e.message;S.al=false;render();}
  });
  document.getElementById('atog')?.addEventListener('click',()=>{S.am=S.am==='login'?'signup':'login';S.aerr='';render();});
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.t;render();}));
  document.getElementById('so')?.addEventListener('click',()=>{sb.auth.signOut();S.user=null;S.bd=null;S.tx=[];render();});
  document.getElementById('mpv')?.addEventListener('click',()=>{if(S.month===0){S.month=11;S.year--;}else S.month--;S.bd=null;loadB();loadT();});
  document.getElementById('mnx')?.addEventListener('click',()=>{if(S.month===11){S.month=0;S.year++;}else S.month++;S.bd=null;loadB();loadT();});
  document.querySelectorAll('.sh[data-s]').forEach(h=>h.addEventListener('click',()=>{const k=h.dataset.s;S.col[k]=!S.col[k];render();}));
  document.querySelectorAll('.ni[data-c]').forEach(inp=>inp.addEventListener('change',()=>{
    const c=inp.dataset.c,i=parseInt(inp.dataset.i);S.bd[c][i].budgeted=parseFloat(inp.value)||0;
    clearTimeout(saveTimer);saveTimer=setTimeout(saveB,900);render();
  }));
  document.querySelectorAll('.db[data-dc]').forEach(b=>b.addEventListener('click',()=>{const c=b.dataset.dc,i=parseInt(b.dataset.di);S.bd[c].splice(i,1);saveB();}));
  document.querySelectorAll('.addb[data-ac]').forEach(b=>b.addEventListener('click',()=>{const c=b.dataset.ac;const n=prompt('New item name for '+CL[c]+':');if(!n)return;S.bd[c].push({name:n,budgeted:0});saveB();}));
  document.getElementById('opm')?.addEventListener('click',()=>{S.modal=true;render();});
  document.getElementById('cm')?.addEventListener('click',()=>{S.modal=false;render();});
  document.getElementById('mbg')?.addEventListener('click',e=>{if(e.target.id==='mbg'){S.modal=false;render();}});
  document.getElementById('se')?.addEventListener('click',()=>{
    S.ne.category=document.getElementById('ec')?.value||'food';S.ne.item_name=document.getElementById('en')?.value||'';
    S.ne.amount=document.getElementById('ea')?.value||'';S.ne.note=document.getElementById('eno')?.value||'';
    S.ne.date=document.getElementById('ed')?.value||new Date().toISOString().split('T')[0];addTx();
  });
  document.getElementById('se-recurring')?.addEventListener('click',()=>{
    const cat  = document.getElementById('ec')?.value||'food';
    const name = document.getElementById('en')?.value||'';
    const amt  = parseFloat(document.getElementById('ea')?.value)||0;
    const note = document.getElementById('eno')?.value||'';
    const date = document.getElementById('ed')?.value||new Date().toISOString().split('T')[0];
    if(!name||!amt){toast('Fill in name and amount first');return;}
    if(!RE.items) RE.items=[];
    const exists = RE.items.find(r=>r.name===name&&r.category===cat);
    if(exists){toast('Already in your recurring list');return;}
    RE.items.push({id:RE.nextId++,name,amount:amt,category:cat,note,active:true,lastPosted:null,createdOn:new Date().toISOString()});
    reSave();
    S.ne={category:cat,item_name:name,amount:amt,note,date};
    addTx();
    toast('Expense logged + added to recurring ↻');
  });
  document.querySelectorAll('.db[data-dt]').forEach(b=>b.addEventListener('click',()=>delTx(b.dataset.dt)));
  document.querySelectorAll('.hc[data-hm]').forEach(c=>c.addEventListener('click',()=>{const[y,m]=c.dataset.hm.split('-');S.year=parseInt(y);S.month=parseInt(m)-1;S.tab='budget';S.bd=null;loadB();loadT();}));

  // ── Mobile bottom nav ──────────────────────────────────────
  // Primary tab buttons in bottom bar
  document.querySelectorAll('.mob-nav .mob-tab[data-t]').forEach(b=>b.addEventListener('click',()=>{
    S.tab=b.dataset.t; render();
  }));

  // "More" button opens the sheet
  document.getElementById('mob-more-btn')?.addEventListener('click',()=>{
    const sheet = document.getElementById('mob-more-sheet');
    if(sheet) sheet.classList.add('open');
  });

  // Close sheet via overlay
  document.getElementById('mob-more-overlay')?.addEventListener('click',()=>{
    document.getElementById('mob-more-sheet')?.classList.remove('open');
  });

  // Items inside the more sheet
  document.querySelectorAll('.mob-more-item[data-t]').forEach(b=>b.addEventListener('click',()=>{
    S.tab=b.dataset.t;
    document.getElementById('mob-more-sheet')?.classList.remove('open');
    render();
  }));

  // Mobile sign out + currency
  document.getElementById('so-mob')?.addEventListener('click',()=>{sb.auth.signOut();S.user=null;S.bd=null;S.tx=[];render();});
  document.getElementById('fx-sel-mob')?.addEventListener('change',e=>setCurrency(e.target.value));
}

// Handle auth callback (email confirmation links redirect here)
const hash=window.location.hash;
if(hash&&hash.includes('access_token')){
  sb.auth.getSession().then(({data})=>{
    if(data.session){
      S.user=data.session.user;
      if(isAdvisor()){ loadAdvisorData(); } else { loadB();loadT();loadH(); }
    }else render();
  });
}else{
  sb.auth.getSession().then(({data})=>{
    S.user=data.session?.user||null; render();
    if(S.user){
      if(isAdvisor()){ loadAdvisorData(); }
      else { loadFX();loadB();loadT();loadH();loadGap();loadLoans();loadGoals();loadRetire();loadRecurring(); }
    }
  });
}
sb.auth.onAuthStateChange((_,session)=>{
  S.user=session?.user||null;
  if(!S.user){S.bd=null;S.tx=[];}
  render();
});
</script>

<style>

<!-- ─── SECTION 1: PERSONAL ─── -->
<div class="form-section active" id="section-1">

      <div class="form-group">
        <label class="f-label">Age <span class="f-required">*</span></label>

      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="f-label">WhatsApp Number <span class="f-required">*</span></label>

        <div class="f-hint">Your advisor will use this to confirm your session and share your plan</div>
      </div>

        <label class="f-label">Email Address <span class="opt">(optional)</span></label>
        <input class="f-input" id="f_email" type="email" placeholder="your@email.com">

    </div>

    <div class="form-grid">

          <option value="single">Single</option>
          <option value="married">Married / Life Partner</option>
          <option value="divorced">Divorced</option>
          <option value="widowed">Widowed</option>
        </select>
      </div>
      <div class="form-group">
        <label class="f-label">Employment Type <span class="f-required">*</span></label>
        <select class="f-select" id="f_emp" required>
          <option value="">Select…</option>
          <option value="employed">Employed (salaried)</option>
          <option value="self_employed">Self-employed</option>
          <option value="business_owner">Business owner</option>
          <option value="contractor">Contractor / Freelance</option>
        </select>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="f-label">Number of Dependents</label>
        <input class="f-input" id="f_dependents" type="number" placeholder="0" min="0">

      </div>

    <div class="form-grid">

      </div>
      <div class="form-group">

        <div class="f-prefix"><span class="f-prefix-sym">P</span><input class="f-input" id="f_passive_inc" type="number" placeholder="0"></div>

<script>
// ═══════════════════════════════════════════════════════
//  GWB CLIENT INTAKE FORM
//  Submits to Google Apps Script → Platform auto-populates
// ═══════════════════════════════════════════════════════

// ── CONFIGURATION — paste your Apps Script URL here after deploying ──
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsgDVWhzYIE22SX-G8oB8hVhjVG7uLXJUEGTCocj9WB_tP49fBhJBevv11euLZQveF/exec';
const SCRIPT_KEY = 'GWB2025';

const SECTION_NAMES = [
  '','Personal Details','Income','Expenses',
  'Debts','Savings & Assets','Protection',
  'Health','Session Goals'
];

let currentSection = 1;
const TOTAL_SECTIONS = 8;

// ── NAVIGATION ──────────────────────────────────────────
function nextSection(n) {
  if (!validateSection(n)) return;
  hideSection(n);
  showSection(n + 1);
  currentSection = n + 1;
  updateProgress(n + 1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevSection(n) {
  hideSection(n);
  showSection(n - 1);
  currentSection = n - 1;
  updateProgress(n - 1);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideSection(n) {
  document.getElementById('section-' + n).classList.remove('active');
}

function showSection(n) {
  document.getElementById('section-' + n).classList.add('active');
}

function updateProgress(n) {
  const pct = ((n - 1) / TOTAL_SECTIONS) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-step-label').textContent = 'Section ' + n + ' of ' + TOTAL_SECTIONS;
  document.getElementById('progress-count-label').textContent = SECTION_NAMES[n];
}

// ── SPOUSE INCOME TOGGLE ────────────────────────────────
function toggleSpouse(show) {
  const field = document.getElementById('spouse-salary-field');
  field.classList.toggle('show', show);
}

// ── VALIDATION ──────────────────────────────────────────
function validateSection(n) {
  let valid = true;
  const section = document.getElementById('section-' + n);
  section.querySelectorAll('[required]').forEach(el => {
    el.classList.remove('f-error');
    if (!el.value.trim()) {
      el.classList.add('f-error');
      valid = false;
    }
  });
  // Radio groups with required
  if (n === 2) {
    const spouseChecked = document.querySelector('input[name="f_spouse_inc"]:checked');
    if (!spouseChecked) {
      valid = false;
      alert('Please select your spouse / partner income status.');
    }
  }
  if (n === 8) {
    const reasonChecked = document.querySelector('input[name="f_reason"]:checked');
    if (!reasonChecked) {
      valid = false;
      alert('Please tell us what brought you here today.');
    }
  }
  if (!valid) {
    const firstErr = section.querySelector('.f-error');
    if (firstErr) firstErr.scrollIntoView({ behavior:'smooth', block:'center' });
  }
  return valid;
}

// ── COLLECT FORM DATA ───────────────────────────────────
function collectData() {
  const gv = id => parseFloat(document.getElementById(id)?.value) || 0;
  const gs = id => document.getElementById(id)?.value || '';
  const gr = name => document.querySelector(`input[name="${name}"]:checked`)?.value || '';
  const gc = id => document.getElementById(id)?.checked || false;

  return {
    // Meta
    submitted_at: new Date().toISOString(),
    source: 'intake_form',

    // Profile
    name: gs('f_name'),
    age: gv('f_age'),
    whatsapp: gs('f_whatsapp'),
    email: gs('f_email'),
    marital: gs('f_marital'),
    emp: gs('f_emp'),
    dependents: gv('f_dependents'),
    youngest: gv('f_youngest'),
    will: gr('f_will'),
    business: gr('f_business') || 'no',

    // Income
    salary: gv('f_salary'),
    business_inc: gv('f_business_inc'),
    side_inc: gv('f_side_inc'),
    passive_inc: gv('f_passive_inc'),
    spouse_income: gr('f_spouse_inc') || 'none',
    spouse_salary: gv('f_spouse_salary'),

    // Expenses
    e_housing: gv('f_e_housing'),
    e_school: gv('f_e_school'),
    e_food: gv('f_e_food'),
    e_transport: gv('f_e_transport'),
    e_utilities: gv('f_e_utilities'),
    e_medical: gv('f_e_medical'),
    e_insurance: gv('f_e_insurance'),
    e_remittance: gv('f_e_remittance'),
    e_other: gv('f_e_other'),

    // Debts
    d_mortgage: gv('f_d_mortgage'),
    d_vehicle: gv('f_d_vehicle'),
    d_personal: gv('f_d_personal'),
    d_credit: gv('f_d_credit'),
    d_business: gv('f_d_business'),
    d_monthly: gv('f_d_monthly'),

    // Savings & Assets
    s_emergency: gv('f_s_emergency'),
    s_cash: gv('f_s_cash'),
    s_portfolio: gv('f_s_portfolio'),
    s_retirement: gv('f_s_retirement'),
    s_monthly: gv('f_s_monthly'),
    a_property: gv('f_a_property'),
    a_business: gv('f_a_business'),

    // Insurance
    life_status: gr('f_life_status') || 'none',
    ins_life: gv('f_ins_life'),
    ins_funeral: gv('f_ins_funeral'),
    ins_disability: gv('f_ins_disability'),
    ins_premium: gv('f_ins_premium'),

    // Health
    health: gs('f_health') || 'good',
    smoker: gs('f_smoker') || 'no',
    c_diabetes: gc('f_c_diabetes'),
    c_hypertension: gc('f_c_hypertension'),
    c_heart: gc('f_c_heart'),
    c_cancer: gc('f_c_cancer'),
    c_hiv: gc('f_c_hiv'),

    // Session
    reason: gr('f_reason'),
    readiness: gr('f_readiness') || 'exploring',
    budget: gv('f_budget'),
    notes: gs('f_notes'),
  };
}

// ── SUBMIT ──────────────────────────────────────────────
async function submitForm() {
  if (!validateSection(8)) return;

  const data = collectData();
  document.getElementById('submitting-overlay').classList.add('show');

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'intake', key: SCRIPT_KEY, data }),
      headers: { 'Content-Type': 'text/plain' },
      redirect: 'follow'
    });
    const text = await response.text();
    const result = JSON.parse(text);
    if (!result.success) console.error('Server error:', result.error);
  } catch(e) {
    console.error('Submission error:', e);
  }

  document.getElementById('submitting-overlay').classList.remove('show');

  // Show thank you
  document.getElementById('gwb-form').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('thankyou-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

    theme_color: '#0A1628',
    lang: 'en',
    categories: ['finance', 'productivity'],
    icons: [
      { src: LOGO_SRC, sizes: '192x192', type: 'image/jpeg', purpose: 'any maskable' },
      { src: LOGO_SRC, sizes: '512x512', type: 'image/jpeg', purpose: 'any maskable' }
    ],
    shortcuts: [
      { name: 'Budget',   short_name: 'Budget',   url: window.location.href.split('?')[0] + '?tab=budget',   description: 'Open monthly budget'   },
      { name: 'Expenses', short_name: 'Expenses',  url: window.location.href.split('?')[0] + '?tab=tracker',  description: 'Log expenses'           },
      { name: 'Wealth Gap', short_name: 'Gap',     url: window.location.href.split('?')[0] + '?tab=gap',      description: 'View your wealth gap'   }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  document.getElementById('pwa-manifest').href = url;

  // Apple touch icon
  if(LOGO_SRC) document.getElementById('apple-icon').href = LOGO_SRC;

  // ── 2. Register service worker ──────────────────────────────────
  // Inline SW as a blob — no external sw.js file needed.
  if('serviceWorker' in navigator){
    const CACHE = 'gwb-planner-v1';
    const SW_CODE = `
const CACHE_NAME = '${CACHE}';
const OFFLINE_PAGE = self.location.href;

// On install: cache the app shell (this very HTML file)
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE_NAME).then(cache =>
      cache.addAll([OFFLINE_PAGE])
    ).then(() => self.skipWaiting())
  );
});

// On activate: clean up old caches
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

// On fetch: network-first for API/Supabase, cache-first for app shell
self.addEventListener('fetch', e => {
  const url = new URL(e.request.url);
  // Always go network-first for Supabase API calls and fonts
  if(url.hostname.includes('supabase.co') || url.hostname.includes('googleapis') || url.hostname.includes('esm.sh')){
    e.respondWith(
      fetch(e.request).catch(() => caches.match(e.request))
    );
    return;
  }
  // For the app shell: cache-first with network fallback
  e.respondWith(
    caches.match(e.request).then(cached => {
      if(cached) return cached;
      return fetch(e.request).then(res => {
        if(res && res.status === 200 && e.request.method === 'GET'){
          const clone = res.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => caches.match(OFFLINE_PAGE));
    })
  );
});
`;
    const swBlob = new Blob([SW_CODE], {type:'application/javascript'});
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, {scope: '/'})
      .then(reg => {
        console.log('[GWB PWA] Service worker registered', reg.scope);
        // Check for updates every time the app loads
        reg.update();
      })
      .catch(err => console.warn('[GWB PWA] SW registration failed:', err));
  }

  // ── 3. Install prompt (Android Chrome "Add to Home Screen") ────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner(){
    if(document.getElementById('gwb-install-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'gwb-install-banner';
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#0A1628 0%,#132040 100%);border-top:2px solid #B8923A;padding:14px 20px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:Inter,system-ui,sans-serif;box-shadow:0 -8px 32px rgba(0,0,0,.35);';
    banner.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0"><div style="width:40px;height:40px;border-radius:10px;background:#B8923A;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">&#128176;</div><div><div style="color:#fff;font-size:13px;font-weight:600;letter-spacing:-.1px">Install GWB Planner</div><div style="color:rgba(255,255,255,.45);font-size:11px;margin-top:1px">Add to your home screen for fast access</div></div></div><div style="display:flex;gap:8px;flex-shrink:0"><button id="gwb-install-dismiss" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:7px 12px;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;font-family:inherit">Not now</button><button id="gwb-install-btn" style="background:linear-gradient(135deg,#B8923A,#D4AA5A);border:none;border-radius:6px;padding:7px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Install</button></div>';
    document.body.appendChild(banner);

    document.getElementById('gwb-install-btn').addEventListener('click', async () => {
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.remove();
    });
    document.getElementById('gwb-install-dismiss').addEventListener('click', () => {
      banner.remove();
      // Don't show again for 7 days
      localStorage.setItem('gwb-install-dismissed', Date.now());
    });
  }

  // Don't show if dismissed in the last 7 days
  const dismissed = parseInt(localStorage.getItem('gwb-install-dismissed') || '0');
  if(Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000){
    window.removeEventListener('beforeinstallprompt', () => {});
  }

  // ── 4. iOS "Add to Home Screen" hint (Safari doesn't fire beforeinstallprompt) ──
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.navigator.standalone === true;
  const iosDismissed = parseInt(localStorage.getItem('gwb-ios-dismissed') || '0');

  if(isIOS && !isInStandalone && (Date.now() - iosDismissed > 7 * 24 * 60 * 60 * 1000)){
    // Show after 3 seconds so the app loads first
    setTimeout(() => {
      if(document.getElementById('gwb-ios-hint')) return;
      const hint = document.createElement('div');
      hint.id = 'gwb-ios-hint';
      hint.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#0A1628 0%,#132040 100%);border-top:2px solid #B8923A;padding:16px 20px calc(16px + env(safe-area-inset-bottom));font-family:Inter,system-ui,sans-serif;box-shadow:0 -8px 32px rgba(0,0,0,.4);';
      hint.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div style="color:#fff;font-size:14px;font-weight:600">Install GWB Planner</div><button id="gwb-ios-close" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;line-height:1;padding:0;margin-top:-2px">&times;</button></div><div style="color:rgba(255,255,255,.6);font-size:12px;line-height:1.6">Tap the <span style="display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.1);border-radius:4px;padding:1px 6px;color:#fff;font-size:11px">Share &#11014;</span> button at the bottom of Safari, then tap <strong style=\"color:#D4AA5A\">\"Add to Home Screen\"</strong> to install this app.</div>';
      document.body.appendChild(hint);
      document.getElementById('gwb-ios-close').addEventListener('click', () => {
        hint.remove();
        localStorage.setItem('gwb-ios-dismissed', Date.now());
      });
    }, 3000);
  }

})();
</script>
</body>
</html>
